<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX事業部 月次売上ダッシュボード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #0d1117; color: #cdd9e5; min-height: 100vh; }
  #header { background: #161b22; border-bottom: 1px solid #21262d; padding: 16px 28px 12px; position: sticky; top: 0; z-index: 50; }
  #header .brand { font-size: 10px; letter-spacing: 3px; color: #388bfd; font-weight: 700; }
  #header .title { font-size: 16px; font-weight: 700; color: #e6edf3; margin-left: 10px; }
  #header .subtitle { font-size: 11px; color: #6e7681; margin-top: 4px; }
  #main { padding: 24px 28px; max-width: 1300px; margin: 0 auto; }
  .card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
  .card-header { padding: 11px 18px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .card-title { font-weight: 700; font-size: 13px; color: #e6edf3; }
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 860px; }
  th { padding: 9px 6px; font-size: 11px; font-weight: 600; color: #6e7681; text-align: center; letter-spacing: 0.3px; white-space: nowrap; background: #0d1117; }
  td { padding: 7px 6px; font-size: 12px; text-align: center; white-space: nowrap; }
  tbody tr { border-top: 1px solid #21262d; }
  tbody tr:nth-child(even) { background: rgba(255,255,255,0.012); }
  th.month-col { cursor: pointer; transition: color 0.15s; border-bottom: 2px solid transparent; }
  th.month-col:hover { color: #cdd9e5; }
  th.month-col.active { color: #388bfd; border-bottom: 2px solid #388bfd; }
  td.month-cell { cursor: pointer; transition: background 0.15s; border-left: 2px solid transparent; }
  td.zero { color: #30363d; }
  td.has-val { color: #cdd9e5; }
  #bar-row td { vertical-align: bottom; padding: 4px 3px 6px; cursor: pointer; }
  #bar-row td .bar-label { font-size: 9px; color: #6e7681; display: block; text-align: center; margin-bottom: 2px; }
  #bar-row td .bar { border-radius: 2px 2px 0 0; background: linear-gradient(to top, #21262d, #30363d); transition: all 0.2s; margin: 0 auto; width: 80%; }
  #bar-row td.active .bar-label { color: #388bfd; font-weight: 700; }
  #bar-row td.active .bar { background: linear-gradient(to top, #1f6feb, #388bfd); }
  #bar-row td.active { background: rgba(56,139,253,0.08); }
  #summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .summary-card { background: #161b22; border-radius: 10px; padding: 14px 18px; }
  .summary-card .fy-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; }
  .summary-card .fy-amount { font-size: 22px; font-weight: 700; color: #e6edf3; letter-spacing: -1px; }
  .summary-card .fy-sub { font-size: 10px; color: #6e7681; margin-top: 3px; }
  td.name-col { text-align: left; max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #cdd9e5; }
  td.num-col { color: #30363d; font-size: 11px; padding-left: 18px; text-align: left; }
  #reset-btn { background: transparent; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; font-size: 11px; padding: 3px 10px; cursor: pointer; display: none; }
  #reset-btn:hover { border-color: #6e7681; color: #cdd9e5; }
  #search { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #cdd9e5; font-size: 12px; padding: 5px 12px; width: 200px; outline: none; }
  #search::placeholder { color: #484f58; }
  #search:focus { border-color: #388bfd; }
  #month-tag { margin-left: 8px; font-size: 12px; color: #388bfd; font-weight: 600; }
  #total-tag { margin-left: 8px; font-size: 11px; color: #6e7681; }
  .fy24 { color: #60a5fa; } .fy25 { color: #34d399; } .fy26 { color: #fb923c; }
  .year-total { color: #e6edf3; font-weight: 700; }
  .fy24-row { font-weight: 700; font-size: 12px; color: #60a5fa; }
  .fy25-row { font-weight: 700; font-size: 12px; color: #34d399; }
  .fy26-row { font-weight: 700; font-size: 12px; color: #fb923c; }
  .note { padding: 8px 18px; border-top: 1px solid #21262d; color: #484f58; font-size: 10px; }
  @media (max-width: 600px) { #main { padding: 16px 12px; } #summary-cards { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="header">
  <div>
    <span class="brand">MX事業部</span>
    <span style="color:#30363d;margin:0 6px">|</span>
    <span class="title">月次売上ダッシュボード</span>
  </div>
  <p class="subtitle">月をクリック → その月の顧客別取引額（FY別・日割り按分）を表示</p>
</div>
<div id="main">
  <div class="card">
    <div class="card-header">

    <div class="tbl-wrap">
      <table id="monthly-table">

      </table>
    </div>
  </div>
  <div id="summary-cards" style="display:none"></div>
  <div class="card">
    <div class="card-header">
      <div>
        <span class="card-title">顧客別取引額</span>
        <span id="month-tag"></span>
        <span id="total-tag">全期間合計</span>
      </div>
      <input id="search" type="text" placeholder="顧客名で検索..." oninput="filterClients()">
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th style="text-align:left;width:36px;padding-left:18px">#</th>
            <th style="text-align:left">エンドクライアント名</th>
            <th class="fy24">FY2024</th>
            <th class="fy25">FY2025</th>
            <th class="fy26">FY2026</th>
            <th class="year-total">合計</th>
          </tr>
        </thead>
        <tbody id="client-body"></tbody>
      </table>
    </div>
    <div class="note">※ 提供開始日〜提供終了日の日数で金額を按分して各月・各FYに計上</div>
  </div>
</div>

    MONTHS.forEach(m=>{
      const v=MONTHLY[fy][m]||0;
      const td=document.createElement('td');
      td.className='month-cell '+(v===0?'zero':'has-val');
      td.id='mc-'+fy+'-'+m; td.textContent=v===0?'—':fmtS(v);
      td.onclick=()=>toggleMonth(m); tr.appendChild(td);
    });
    const tdS=document.createElement('td'); tdS.className='year-total';
    tdS.textContent=fmtS(Object.values(MONTHLY[fy]).reduce((s,v)=>s+v,0));
    tr.appendChild(tdS); tbody.appendChild(tr);
  });
  const barTr=document.createElement('tr');
  barTr.id='bar-row'; barTr.style.cssText='border-top:2px solid #21262d;background:#0d1117';
  const tdL=document.createElement('td');
  tdL.style.cssText='color:#6e7681;font-size:11px;text-align:center;padding:7px 6px;';
  tdL.textContent='月合計'; barTr.appendChild(tdL);
  monthSums.forEach(ms=>{
    const td=document.createElement('td'); td.id='bar-'+ms.m; td.onclick=()=>toggleMonth(ms.m);
    const h=maxTotal>0?Math.max(ms.total/maxTotal*40,2):2;
    td.innerHTML=`<span class="bar-label">${fmtS(ms.total)}</span><div class="bar" style="height:${h}px"></div>`;
    barTr.appendChild(td);
  });
  const tdGT=document.createElement('td'); tdGT.className='year-total';
  tdGT.style.cssText='font-size:12px;text-align:center;vertical-align:middle;padding:7px 6px;';
  tdGT.textContent=fmtS(monthSums.reduce((s,m)=>s+m.total,0)); barTr.appendChild(tdGT);
  tbody.appendChild(barTr);
}

function toggleMonth(m) {
  if(selectedMonth===m){resetMonth();return;}
  selectedMonth=m; updateHighlight(); renderSummaryCards(); renderClientTable();
  document.getElementById('reset-btn').style.display='inline-block';
  document.getElementById('reset-btn').textContent='✕ '+m+' 選択解除';
}
function resetMonth() {
  selectedMonth=null; updateHighlight();
  document.getElementById('summary-cards').style.display='none';
  document.getElementById('reset-btn').style.display='none';
  renderClientTable();
}
function updateHighlight() {
  MONTHS.forEach(m=>{
    document.getElementById('mh-'+m).classList.toggle('active',selectedMonth===m);
    document.getElementById('bar-'+m).classList.toggle('active',selectedMonth===m);
    YEARS.forEach(fy=>{
      const td=document.getElementById('mc-'+fy+'-'+m); if(!td)return;
      const v=MONTHLY[fy][m]||0; const active=selectedMonth===m;
      td.style.background=active?YM[fy]:'';
      td.style.color=active?(v===0?'#30363d':YC[fy]):(v===0?'#30363d':'#cdd9e5');
      td.style.fontWeight=active&&v?'600':'';
      td.style.borderLeft=active?'2px solid rgba(56,139,253,0.3)':'2px solid transparent';
    });
  });
}
function renderSummaryCards() {
  if(!selectedMonth)return;
  const ms=monthSums.find(x=>x.m===selectedMonth);
  const c=document.getElementById('summary-cards'); c.style.display='grid'; c.innerHTML='';
  [{fy:'FY2024',v:ms.fy24},{fy:'FY2025',v:ms.fy25},{fy:'FY2026',v:ms.fy26}].forEach(({fy,v})=>{
    const el=document.createElement('div'); el.className='summary-card';
    el.style.border=`1px solid ${YC[fy]}40`;
    el.innerHTML=`<div class="fy-label" style="color:${YC[fy]}">${fy} · ${selectedMonth}</div><div class="fy-amount">${fmt(v)}</div><div class="fy-sub">売上合計（按分）</div>`;
    c.appendChild(el);
  });
}
function getClientData() {
  if(!selectedMonth){
    const agg={};
    Object.values(MC).flat().forEach(r=>{
      if(!agg[r.n])agg[r.n]={n:r.n,y24:0,y25:0,y26:0};
      agg[r.n].y24+=r.y24; agg[r.n].y25+=r.y25; agg[r.n].y26+=r.y26;
    });
    return Object.values(agg).sort((a,b)=>(b.y24+b.y25+b.y26)-(a.y24+a.y25+a.y26));
  }
  return MC[MONTH_NUM[selectedMonth]]||[];
}
let currentData=[];
function renderClientTable() {
  currentData=getClientData();
  const mt=document.getElementById('month-tag'), tt=document.getElementById('total-tag');
  if(selectedMonth){mt.textContent='— '+selectedMonth+'（'+currentData.length+'社）';tt.textContent='';}
  else{mt.textContent='';tt.textContent='全期間合計';}
  document.getElementById('search').value='';
  renderRows(currentData);
}
function filterClients(){
  const q=document.getElementById('search').value;
  renderRows(q?currentData.filter(r=>r.n.includes(q)):currentData);
}
function renderRows(rows){
  const tbody=document.getElementById('client-body'); tbody.innerHTML='';
  rows.forEach((c,i)=>{
    const tot=c.y24+c.y25+c.y26; const tr=document.createElement('tr');
    tr.innerHTML=`<td class="num-col">${i+1}</td><td class="name-col">${esc(c.n)}</td><td style="color:${c.y24?YC.FY2024:'#30363d'}">${c.y24?fmt(c.y24):'—'}</td><td style="color:${c.y25?YC.FY2025:'#30363d'}">${c.y25?fmt(c.y25):'—'}</td><td style="color:${c.y26?YC.FY2026:'#30363d'}">${c.y26?fmt(c.y26):'—'}</td><td style="font-weight:600;color:#e6edf3">${fmt(tot)}</td>`;
    tbody.appendChild(tr);
  });
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
buildMonthlyTable();
renderClientTable();
</script>
</body>
</html>
