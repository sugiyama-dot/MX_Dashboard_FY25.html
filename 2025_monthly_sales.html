<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX事業部 月次売上ダッシュボード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #0d1117; color: #cdd9e5; min-height: 100vh; }
  #header { background: #161b22; border-bottom: 1px solid #21262d; padding: 16px 28px 12px; position: sticky; top: 0; z-index: 50; }
  #header .brand { font-size: 10px; letter-spacing: 3px; color: #388bfd; font-weight: 700; }
  #header .title { font-size: 16px; font-weight: 700; color: #e6edf3; margin-left: 10px; }
  #header .subtitle { font-size: 11px; color: #6e7681; margin-top: 4px; }
  #main { padding: 24px 28px; max-width: 1300px; margin: 0 auto; }
  .card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
  .card-header { padding: 11px 18px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .card-title { font-weight: 700; font-size: 13px; color: #e6edf3; }
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 860px; }
  th { padding: 9px 6px; font-size: 11px; font-weight: 600; color: #6e7681; text-align: center; letter-spacing: 0.3px; white-space: nowrap; background: #0d1117; }
  td { padding: 7px 6px; font-size: 12px; text-align: center; white-space: nowrap; }
  tbody tr { border-top: 1px solid #21262d; }
  tbody tr:nth-child(even) { background: rgba(255,255,255,0.012); }
  th.month-col { cursor: pointer; transition: color 0.15s; border-bottom: 2px solid transparent; }
  th.month-col:hover { color: #cdd9e5; }
  th.month-col.active { color: #388bfd; border-bottom: 2px solid #388bfd; }
  td.month-cell { cursor: pointer; transition: background 0.15s; border-left: 2px solid transparent; }
  td.zero { color: #30363d; }
  td.has-val { color: #cdd9e5; }
  #bar-row td { vertical-align: bottom; padding: 4px 3px 6px; cursor: pointer; }
  #bar-row td .bar-label { font-size: 9px; color: #6e7681; display: block; text-align: center; margin-bottom: 2px; }
  #bar-row td .bar-wrap { display: flex; flex-direction: column-reverse; align-items: center; width: 80%; margin: 0 auto; gap: 0; }
  #bar-row td .bar-pmx { background: linear-gradient(to top, #1a4fa0, #3b7dd8); transition: all 0.2s; width: 100%; }
  #bar-row td .bar-dmx { background: linear-gradient(to top, #4c1d95, #7c3aed); transition: all 0.2s; width: 100%; }
  #bar-row td .bar-other { background: linear-gradient(to top, #21262d, #30363d); transition: all 0.2s; width: 100%; border-radius: 2px 2px 0 0; }
  #bar-row td .bar-top { border-radius: 2px 2px 0 0; }
  #bar-row td.active .bar-label { color: #388bfd; font-weight: 700; }
  #bar-row td.active .bar-pmx { background: linear-gradient(to top, #1f6feb, #60a5fa); }
  #bar-row td.active .bar-dmx { background: linear-gradient(to top, #6d28d9, #a78bfa); }
  #bar-row td.active { background: rgba(56,139,253,0.08); }
  #summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .summary-card { background: #161b22; border-radius: 10px; padding: 14px 18px; }
  .summary-card .fy-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; }
  .summary-card .fy-amount { font-size: 22px; font-weight: 700; color: #e6edf3; letter-spacing: -1px; }
  .summary-card .fy-sub { font-size: 10px; color: #6e7681; margin-top: 3px; }
  td.name-col { text-align: left; max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #cdd9e5; }
  td.num-col { color: #30363d; font-size: 11px; padding-left: 18px; text-align: left; }
  #reset-btn { background: transparent; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; font-size: 11px; padding: 3px 10px; cursor: pointer; display: none; }
  #reset-btn:hover { border-color: #6e7681; color: #cdd9e5; }
  #search { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #cdd9e5; font-size: 12px; padding: 5px 12px; width: 200px; outline: none; }
  #search::placeholder { color: #484f58; }
  #search:focus { border-color: #388bfd; }
  #month-tag { margin-left: 8px; font-size: 12px; color: #388bfd; font-weight: 600; }
  #total-tag { margin-left: 8px; font-size: 11px; color: #6e7681; }
  .fy24 { color: #60a5fa; } .fy25 { color: #34d399; } .fy26 { color: #fb923c; }
  .year-total { color: #e6edf3; font-weight: 700; }
  .fy24-row { font-weight: 700; font-size: 12px; color: #60a5fa; }
  .fy25-row { font-weight: 700; font-size: 12px; color: #34d399; }
  .fy26-row { font-weight: 700; font-size: 12px; color: #fb923c; }
  .note { padding: 8px 18px; border-top: 1px solid #21262d; color: #484f58; font-size: 10px; }
  /* Filter tabs */
  .filter-tabs { display: flex; gap: 6px; align-items: center; }
  .filter-tab { background: transparent; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; font-size: 11px; font-weight: 600; padding: 4px 14px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px; }
  .filter-tab:hover { border-color: #6e7681; color: #cdd9e5; }
  .filter-tab.active-all { border-color: #388bfd; color: #388bfd; background: rgba(56,139,253,0.1); }
  .filter-tab.active-pmx { border-color: #60a5fa; color: #60a5fa; background: rgba(96,165,250,0.12); }
  .filter-tab.active-dmx { border-color: #a78bfa; color: #a78bfa; background: rgba(167,139,250,0.12); }
  /* Segment summary */
  #segment-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
  .seg-card { background: #161b22; border-radius: 10px; padding: 14px 18px; }
  .seg-card .seg-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; margin-bottom: 4px; }
  .seg-card .seg-amount { font-size: 20px; font-weight: 700; color: #e6edf3; letter-spacing: -1px; }
  .seg-card .seg-sub { font-size: 10px; color: #6e7681; margin-top: 2px; }
  .seg-card .seg-breakdown { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
  .seg-card .seg-fy { font-size: 10px; }
  .seg-card .seg-bar { margin-top: 8px; height: 3px; border-radius: 2px; background: #21262d; overflow: hidden; }
  .seg-card .seg-bar-fill { height: 100%; border-radius: 2px; }
  /* bar legend */
  .bar-legend { display: flex; gap: 14px; align-items: center; padding: 6px 18px 8px; border-top: 1px solid #21262d; flex-wrap: wrap; }
  .bar-legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #6e7681; }
  .bar-legend-dot { width: 10px; height: 8px; border-radius: 2px; }
  /* table seg badge */
  .seg-badge { display: inline-block; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-left: 5px; vertical-align: middle; letter-spacing: 0.5px; }
  .seg-badge-pmx { background: rgba(96,165,250,0.15); color: #60a5fa; }
  .seg-badge-dmx { background: rgba(167,139,250,0.15); color: #a78bfa; }
  /* pw screen */
  #pw-screen { position: fixed; inset: 0; background: #0d1117; display: flex; align-items: center; justify-content: center; z-index: 9999; }
  #pw-box { background: #161b22; border: 1px solid #21262d; border-radius: 14px; padding: 40px 48px; text-align: center; width: 340px; }
  #pw-box .pw-brand { font-size: 10px; letter-spacing: 3px; color: #388bfd; font-weight: 700; margin-bottom: 8px; }
  #pw-box .pw-title { font-size: 18px; font-weight: 700; color: #e6edf3; margin-bottom: 6px; }
  #pw-box .pw-sub { font-size: 12px; color: #6e7681; margin-bottom: 28px; }
  #pw-input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 14px; padding: 10px 14px; outline: none; text-align: center; letter-spacing: 2px; margin-bottom: 12px; transition: border-color 0.2s; }
  #pw-input:focus { border-color: #388bfd; }
  #pw-input.error { border-color: #f85149; animation: shake 0.3s; }
  #pw-btn { width: 100%; background: #1f6feb; border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 600; padding: 10px; cursor: pointer; transition: background 0.2s; }
  #pw-btn:hover { background: #388bfd; }
  #pw-error { font-size: 12px; color: #f85149; margin-top: 10px; min-height: 18px; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  @media (max-width: 600px) { #main { padding: 16px 12px; } #summary-cards,#segment-cards { grid-template-columns: 1fr; } }
</style>
</head>

<div id="pw-screen">
  <div id="pw-box">
    <div class="pw-brand">MX事業部</div>
    <div class="pw-title">月次売上ダッシュボード</div>
    <div class="pw-sub">パスワードを入力してください</div>
    <input id="pw-input" type="password" placeholder="••••••••••••" onkeydown="if(event.key==='Enter')checkPw()">
    <button id="pw-btn" onclick="checkPw()">ログイン</button>
    <div id="pw-error"></div>
  </div>
</div>
<div id="header">
  <div>

    <span class="title">月次売上ダッシュボード</span>

  <p class="subtitle">月をクリック → その月の顧客別取引額（FY別・日割り按分）を表示</p>
</div>
<div id="main">

        <div class="filter-tabs">
          <button class="filter-tab active-all" onclick="setFilter('all')">ALL</button>
          <button class="filter-tab" onclick="setFilter('pmx')" id="tab-pmx">PMX</button>
          <button class="filter-tab" onclick="setFilter('dmx')" id="tab-dmx">DMX</button>
        </div>
      </div>
      <button id="reset-btn" onclick="resetMonth()">✕ 選択解除</button>
    </div>
    <div class="tbl-wrap">

    <div class="bar-legend">

      <span class="bar-legend-item"><span class="bar-legend-dot" style="background:#30363d"></span>その他</span>
    </div>
  </div>
  <div id="segment-cards" style="display:none"></div>
  <div id="summary-cards" style="display:none"></div>
  <div class="card">
    <div class="card-header">
      <div>
        <span class="card-title">顧客別取引額</span>
        <span id="month-tag"></span>
        <span id="total-tag">全期間合計</span>
      </div>
      <input id="search" type="text" placeholder="顧客名で検索..." oninput="filterClients()">
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>

        </thead>
        <tbody id="client-body"></tbody>
      </table>
    </div>

  </div>
</div>

<script>

const YEARS = ['FY2024','FY2025','FY2026'];
const YC = {FY2024:'#60a5fa',FY2025:'#34d399',FY2026:'#fb923c'};
const YM = {FY2024:'rgba(96,165,250,0.13)',FY2025:'rgba(52,211,153,0.13)',FY2026:'rgba(251,146,60,0.13)'};
const PMX_COLOR = '#3b7dd8';
const DMX_COLOR = '#7c3aed';

let selectedMonth = null;
let currentFilter = 'all'; // 'all' | 'pmx' | 'dmx'

const fmt  = v => v ? '¥' + Math.round(v).toLocaleString() : '—';
const fmtS = v => {
  if (!v) return '—';
  if (v >= 100000000) return (v/100000000).toFixed(1) + '億';
  if (v >= 10000000)  return (v/10000000).toFixed(0) + '千万';
  if (v >= 1000000)   return (v/1000000).toFixed(1) + 'M';
  return (v/1000).toFixed(0) + 'K';
};

function getMonthlyData(fy, m) {
  if (currentFilter === 'pmx') return (PMX_MONTHLY[fy]||{})[m]||0;
  if (currentFilter === 'dmx') return (DMX_MONTHLY[fy]||{})[m]||0;
  return (MONTHLY[fy]||{})[m]||0;
}

const monthSums = MONTHS.map(m => ({
  m,
  total: YEARS.reduce((s,fy)=>s+((MONTHLY[fy]||{})[m]||0),0),
  pmx: YEARS.reduce((s,fy)=>s+((PMX_MONTHLY[fy]||{})[m]||0),0),
  dmx: YEARS.reduce((s,fy)=>s+((DMX_MONTHLY[fy]||{})[m]||0),0),
}));
const maxTotal = Math.max(...monthSums.map(x=>x.total));

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => {
    t.className = 'filter-tab';
  });
  if (f === 'all') document.querySelector('.filter-tab').className = 'filter-tab active-all';
  else if (f === 'pmx') document.getElementById('tab-pmx').className = 'filter-tab active-pmx';
  else document.getElementById('tab-dmx').className = 'filter-tab active-dmx';
  rebuildMonthlyTable();
  renderClientTable();
  if (selectedMonth) renderSummaryCards();
}

function buildMonthlyTable() {
  const hr = document.getElementById('month-header-row');
  MONTHS.forEach(m => {
    const th = document.createElement('th');
    th.className='month-col'; th.id='mh-'+m; th.textContent=m;
    th.onclick=()=>toggleMonth(m); hr.appendChild(th);
  });
  const thT=document.createElement('th'); thT.className='year-total'; thT.textContent='年度計'; hr.appendChild(thT);
  rebuildMonthlyBody();
}

function rebuildMonthlyTable() {
  const hr = document.getElementById('month-header-row');
  // keep header, rebuild body
  rebuildMonthlyBody();
}

function rebuildMonthlyBody() {
  const tbody = document.getElementById('monthly-body');
  tbody.innerHTML = '';

  YEARS.forEach(fy=>{
    const tr=document.createElement('tr');
    const tdFY=document.createElement('td');
    tdFY.className=fy==='FY2024'?'fy24-row':fy==='FY2025'?'fy25-row':'fy26-row';
    tdFY.textContent=fy; tr.appendChild(tdFY);
    MONTHS.forEach(m=>{
      const v=getMonthlyData(fy,m);
      const td=document.createElement('td');
      td.className='month-cell '+(v===0?'zero':'has-val');
      td.id='mc-'+fy+'-'+m; td.textContent=v===0?'—':fmtS(v);
      td.onclick=()=>toggleMonth(m); tr.appendChild(td);
    });
    const tdS=document.createElement('td'); tdS.className='year-total';
    tdS.textContent=fmtS(MONTHS.reduce((s,m)=>s+getMonthlyData(fy,m),0));
    tr.appendChild(tdS); tbody.appendChild(tr);
  });

  // Bar row
  const barTr=document.createElement('tr');
  barTr.id='bar-row'; barTr.style.cssText='border-top:2px solid #21262d;background:#0d1117';
  const tdL=document.createElement('td');
  tdL.style.cssText='color:#6e7681;font-size:11px;text-align:center;padding:7px 6px;';
  tdL.textContent='月合計'; barTr.appendChild(tdL);

  monthSums.forEach(ms=>{
    const td=document.createElement('td'); td.id='bar-'+ms.m; td.onclick=()=>toggleMonth(ms.m);
    const displayTotal = currentFilter==='pmx' ? ms.pmx : currentFilter==='dmx' ? ms.dmx : ms.total;
    const h=maxTotal>0?Math.max(displayTotal/maxTotal*44,2):2;
    const labelVal = fmtS(displayTotal);

    let barsHTML = '';
    if (currentFilter === 'all') {
      const otherVal = ms.total - ms.pmx - ms.dmx;
      const hPmx = maxTotal>0 ? ms.pmx/maxTotal*44 : 0;
      const hDmx = maxTotal>0 ? ms.dmx/maxTotal*44 : 0;
      const hOther = maxTotal>0 ? Math.max(otherVal/maxTotal*44, otherVal>0?1:0) : 0;
      // 積み上げ: other (底) → dmx → pmx (上)
      barsHTML = `<div class="bar-wrap" style="height:44px;justify-content:flex-end;">
        ${hOther>0?`<div class="bar-other" style="height:${hOther}px"></div>`:''}
        ${hDmx>0?`<div class="bar-dmx" style="height:${hDmx}px"></div>`:''}
        ${hPmx>0?`<div class="bar-pmx bar-top" style="height:${hPmx}px"></div>`:''}
      </div>`;
    } else {
      const color = currentFilter==='pmx' ? PMX_COLOR : DMX_COLOR;
      barsHTML = `<div class="bar-wrap" style="height:44px;justify-content:flex-end;">
        <div class="bar-${currentFilter}" style="height:${h}px;border-radius:2px 2px 0 0"></div>
      </div>`;
    }
    td.innerHTML=`<span class="bar-label">${labelVal}</span>${barsHTML}`;
    barTr.appendChild(td);
  });

  const tdGT=document.createElement('td'); tdGT.className='year-total';
  tdGT.style.cssText='font-size:12px;text-align:center;vertical-align:middle;padding:7px 6px;';

    : currentFilter==='dmx'
    ? monthSums.reduce((s,m)=>s+m.dmx,0)
    : monthSums.reduce((s,m)=>s+m.total,0);
  tdGT.textContent=fmtS(gtTotal);
  barTr.appendChild(tdGT);
  tbody.appendChild(barTr);
  updateHighlight();
}

function toggleMonth(m) {
  if(selectedMonth===m){resetMonth();return;}
  selectedMonth=m; updateHighlight(); renderSummaryCards(); renderSegmentCards(); renderClientTable();
  document.getElementById('reset-btn').style.display='inline-block';
  document.getElementById('reset-btn').textContent='✕ '+m+' 選択解除';
}

function resetMonth() {
  selectedMonth=null; updateHighlight();
  document.getElementById('summary-cards').style.display='none';
  document.getElementById('segment-cards').style.display='none';
  document.getElementById('reset-btn').style.display='none';
  renderClientTable();
}

function updateHighlight() {
  MONTHS.forEach(m=>{
    const mhEl = document.getElementById('mh-'+m);
    const barEl = document.getElementById('bar-'+m);
    if(mhEl) mhEl.classList.toggle('active',selectedMonth===m);
    if(barEl) barEl.classList.toggle('active',selectedMonth===m);
    YEARS.forEach(fy=>{
      const td=document.getElementById('mc-'+fy+'-'+m); if(!td)return;
      const v=getMonthlyData(fy,m); const active=selectedMonth===m;
      td.style.background=active?YM[fy]:'';
      td.style.color=active?(v===0?'#30363d':YC[fy]):(v===0?'#30363d':'#cdd9e5');
      td.style.fontWeight=active&&v?'600':'';
      td.style.borderLeft=active?'2px solid rgba(56,139,253,0.3)':'2px solid transparent';
    });
  });
}

  [{fy:'FY2024',v:fys24},{fy:'FY2025',v:fys25},{fy:'FY2026',v:fys26}].forEach(({fy,v})=>{
    const el=document.createElement('div'); el.className='summary-card';
    el.style.border=`1px solid ${YC[fy]}40`;
    el.innerHTML=`<div class="fy-label" style="color:${YC[fy]}">${fy} · ${selectedMonth}</div><div class="fy-amount">${fmt(v)}</div><div class="fy-sub">売上合計（按分）</div>`;
    c.appendChild(el);
  });
}

function renderSegmentCards() {
  if(!selectedMonth)return;
  const mnum = MONTH_NUM[selectedMonth];
  const c=document.getElementById('segment-cards'); c.style.display='grid'; c.innerHTML='';

  const pmxData = MC_PMX[mnum]||[];
  const dmxData = MC_DMX[mnum]||[];
  const pmxTotal = pmxData.reduce((s,r)=>s+r.y24+r.y25+r.y26,0);
  const dmxTotal = dmxData.reduce((s,r)=>s+r.y24+r.y25+r.y26,0);
  const grandTotal = pmxTotal + dmxTotal;

  const segments = [
    {label:'PMX', color:'#60a5fa', bg:'rgba(96,165,250,0.15)', total:pmxTotal, cnt:pmxData.length},
    {label:'DMX', color:'#a78bfa', bg:'rgba(167,139,250,0.15)', total:dmxTotal, cnt:dmxData.length},
  ];

  segments.forEach(seg=>{
    const pct = grandTotal > 0 ? (seg.total/grandTotal*100).toFixed(0) : 0;
    const el=document.createElement('div'); el.className='seg-card';
    el.style.border=`1px solid ${seg.color}40`;
    el.innerHTML=`
      <div class="seg-label" style="color:${seg.color}">${seg.label} · ${selectedMonth}</div>
      <div class="seg-amount">${fmt(seg.total)}</div>
      <div class="seg-sub">${seg.cnt}社 ／ 全体の${pct}%</div>
      <div class="seg-bar"><div class="seg-bar-fill" style="width:${pct}%;background:${seg.color}"></div></div>
    `;
    c.appendChild(el);
  });
}

function getClientData() {
  const mnum = selectedMonth ? MONTH_NUM[selectedMonth] : null;
  if (currentFilter === 'pmx') {
    if (!mnum) {
      const agg={};
      Object.values(MC_PMX).flat().forEach(r=>{
        if(!agg[r.n])agg[r.n]={n:r.n,y24:0,y25:0,y26:0};
        agg[r.n].y24+=r.y24; agg[r.n].y25+=r.y25; agg[r.n].y26+=r.y26;
      });
      return Object.values(agg).sort((a,b)=>(b.y24+b.y25+b.y26)-(a.y24+a.y25+a.y26));
    }
    return MC_PMX[mnum]||[];
  }
  if (currentFilter === 'dmx') {
    if (!mnum) {
      const agg={};
      Object.values(MC_DMX).flat().forEach(r=>{
        if(!agg[r.n])agg[r.n]={n:r.n,y24:0,y25:0,y26:0};
        agg[r.n].y24+=r.y24; agg[r.n].y25+=r.y25; agg[r.n].y26+=r.y26;
      });
      return Object.values(agg).sort((a,b)=>(b.y24+b.y25+b.y26)-(a.y24+a.y25+a.y26));
    }
    return MC_DMX[mnum]||[];
  }
  // all
  if(!mnum){
    const agg={};
    Object.values(MC).flat().forEach(r=>{
      if(!agg[r.n])agg[r.n]={n:r.n,y24:0,y25:0,y26:0};
      agg[r.n].y24+=r.y24; agg[r.n].y25+=r.y25; agg[r.n].y26+=r.y26;
    });
    return Object.values(agg).sort((a,b)=>(b.y24+b.y25+b.y26)-(a.y24+a.y25+a.y26));
  }
  return MC[mnum]||[];
}

let currentData=[];
function renderClientTable() {
  currentData=getClientData();
  const mt=document.getElementById('month-tag'), tt=document.getElementById('total-tag');
  const filterLabel = currentFilter==='pmx'?' [PMX]':currentFilter==='dmx'?' [DMX]':'';
  if(selectedMonth){mt.textContent='— '+selectedMonth+filterLabel+'（'+currentData.length+'社）';tt.textContent='';}
  else{mt.textContent=filterLabel?filterLabel+' 全期間':'';tt.textContent=filterLabel?'':'全期間合計';}
  document.getElementById('search').value='';
  renderRows(currentData);
}

function filterClients(){
  const q=document.getElementById('search').value;
  renderRows(q?currentData.filter(r=>r.n.includes(q)):currentData);
}

function getSegBadge(name) {
  const isPmx = CLIENT_PMX.has(name);
  const isDmx = CLIENT_DMX.has(name);
  if (isPmx && isDmx) return '<span class="seg-badge seg-badge-pmx">PMX</span><span class="seg-badge seg-badge-dmx">DMX</span>';
  if (isPmx) return '<span class="seg-badge seg-badge-pmx">PMX</span>';
  if (isDmx) return '<span class="seg-badge seg-badge-dmx">DMX</span>';
  return '';
}

function renderRows(rows){
  const tbody=document.getElementById('client-body'); tbody.innerHTML='';
  rows.forEach((c,i)=>{
    const tot=c.y24+c.y25+c.y26; const tr=document.createElement('tr');
    const badge = currentFilter==='all' ? getSegBadge(c.n) : '';
    tr.innerHTML=`<td class="num-col">${i+1}</td><td class="name-col">${esc(c.n)}${badge}</td><td style="color:${c.y24?YC.FY2024:'#30363d'}">${c.y24?fmt(c.y24):'—'}</td><td style="color:${c.y25?YC.FY2025:'#30363d'}">${c.y25?fmt(c.y25):'—'}</td><td style="color:${c.y26?YC.FY2026:'#30363d'}">${c.y26?fmt(c.y26):'—'}</td><td style="font-weight:600;color:#e6edf3">${fmt(tot)}</td>`;
    tbody.appendChild(tr);
  });
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

buildMonthlyTable();
renderClientTable();

</script>
<script>
(function(){
  async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  const HASH = '4801be4126759544cacb1da40778dd36f280bb99934c6ee90dcdccaa74062888';
  window.checkPw = async function() {
    const val = document.getElementById('pw-input').value;
    const h = await sha256(val);
    if (h === HASH) {
      document.getElementById('pw-screen').style.display = 'none';
      document.getElementById('pw-input').value = '';
    } else {
      const inp = document.getElementById('pw-input');
      inp.classList.add('error');
      document.getElementById('pw-error').textContent = 'パスワードが違います';
      setTimeout(()=>inp.classList.remove('error'), 400);
    }
  };
})();
</script>
