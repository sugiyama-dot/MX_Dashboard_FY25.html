<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX事業部 月次売上ダッシュボード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #0d1117; color: #cdd9e5; min-height: 100vh; }

  /* Header */
  #header { background: #161b22; border-bottom: 1px solid #21262d; padding: 16px 28px 12px; position: sticky; top: 0; z-index: 50; }
  #header .brand { font-size: 10px; letter-spacing: 3px; color: #388bfd; font-weight: 700; }
  #header .title { font-size: 16px; font-weight: 700; color: #e6edf3; margin-left: 10px; }
  #header .subtitle { font-size: 11px; color: #6e7681; margin-top: 4px; }

  /* Main */
  #main { padding: 24px 28px; max-width: 1300px; margin: 0 auto; }

  /* Card */
  .card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
  .card-header { padding: 11px 18px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .card-title { font-weight: 700; font-size: 13px; color: #e6edf3; }

  /* Table */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 860px; }
  th { padding: 9px 6px; font-size: 11px; font-weight: 600; color: #6e7681; text-align: center; letter-spacing: 0.3px; white-space: nowrap; background: #0d1117; }
  td { padding: 7px 6px; font-size: 12px; text-align: center; white-space: nowrap; }
  tbody tr { border-top: 1px solid #21262d; }
  tbody tr:nth-child(even) { background: rgba(255,255,255,0.012); }

  /* Month header clickable */
  th.month-col { cursor: pointer; transition: color 0.15s; border-bottom: 2px solid transparent; }
  th.month-col:hover { color: #cdd9e5; }
  th.month-col.active { color: #388bfd; border-bottom: 2px solid #388bfd; }

  /* Data cells */
  td.month-cell { cursor: pointer; transition: background 0.15s; border-left: 2px solid transparent; }
  td.zero { color: #30363d; }
  td.has-val { color: #cdd9e5; }

  /* Bar row */
  #bar-row td { vertical-align: bottom; padding: 4px 3px 6px; cursor: pointer; }
  #bar-row td .bar-label { font-size: 9px; color: #6e7681; display: block; text-align: center; margin-bottom: 2px; }
  #bar-row td .bar { border-radius: 2px 2px 0 0; background: linear-gradient(to top, #21262d, #30363d); transition: all 0.2s; margin: 0 auto; width: 80%; }
  #bar-row td.active .bar-label { color: #388bfd; font-weight: 700; }
  #bar-row td.active .bar { background: linear-gradient(to top, #1f6feb, #388bfd); }
  #bar-row td.active { background: rgba(56,139,253,0.08); }

  /* Summary cards */
  #summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .summary-card { background: #161b22; border-radius: 10px; padding: 14px 18px; }
  .summary-card .fy-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; }
  .summary-card .fy-amount { font-size: 22px; font-weight: 700; color: #e6edf3; letter-spacing: -1px; }
  .summary-card .fy-sub { font-size: 10px; color: #6e7681; margin-top: 3px; }

  /* Client table */
  td.name-col { text-align: left; max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #cdd9e5; }
  td.num-col { color: #30363d; font-size: 11px; padding-left: 18px; text-align: left; }

  /* Reset button */
  #reset-btn { background: transparent; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; font-size: 11px; padding: 3px 10px; cursor: pointer; display: none; }
  #reset-btn:hover { border-color: #6e7681; color: #cdd9e5; }

  /* Search */
  #search { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #cdd9e5; font-size: 12px; padding: 5px 12px; width: 200px; outline: none; }
  #search::placeholder { color: #484f58; }
  #search:focus { border-color: #388bfd; }

  /* Month tag */
  #month-tag { margin-left: 8px; font-size: 12px; color: #388bfd; font-weight: 600; }
  #total-tag { margin-left: 8px; font-size: 11px; color: #6e7681; }

  /* FY colors */
  .fy24 { color: #60a5fa; }
  .fy25 { color: #34d399; }
  .fy26 { color: #fb923c; }
  .year-total { color: #e6edf3; font-weight: 700; }
  .fy24-row { font-weight: 700; font-size: 12px; color: #60a5fa; }
  .fy25-row { font-weight: 700; font-size: 12px; color: #34d399; }
  .fy26-row { font-weight: 700; font-size: 12px; color: #fb923c; }
  .fy24-val { color: #60a5fa; }
  .fy25-val { color: #34d399; }
  .fy26-val { color: #fb923c; }

  @media (max-width: 600px) {
    #main { padding: 16px 12px; }
    #summary-cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="header">

        </tbody>

  </div>

  <!-- Summary cards -->

    <div class="card-header">
      <div>
        <span class="card-title">顧客別取引額</span>
        <span id="month-tag"></span>

    <div class="tbl-wrap">

            <th class="year-total">合計</th>

        </thead>
        <tbody id="client-body"></tbody>
      </table>
    </div>
  </div>

</div>

00},{"n":"遠州鉄道株式会社","y24":0,"y25":50000,"y26":0,"t":50000}]};

const YEARS = ['FY2024','FY2025','FY2026'];
const YC = {FY2024:'#60a5fa',FY2025:'#34d399',FY2026:'#fb923c'};
const YM = {FY2024:'rgba(96,165,250,0.13)',FY2025:'rgba(52,211,153,0.13)',FY2026:'rgba(251,146,60,0.13)'};

let selectedMonth = null;

const fmt = v => v ? '¥' + v.toLocaleString() : '—';
const fmtS = v => {
  if (!v) return '—';
  if (v >= 100000000) return (v/100000000).toFixed(1) + '億';
  if (v >= 10000000)  return (v/10000000).toFixed(0) + '千万';
  if (v >= 1000000)   return (v/1000000).toFixed(1) + 'M';
  return (v/1000).toFixed(0) + 'K';
};

// 月次合計
const monthSums = MONTHS.map(m => ({
  m,
  fy24: MONTHLY.FY2024[m]||0,
  fy25: MONTHLY.FY2025[m]||0,
  fy26: MONTHLY.FY2026[m]||0,
  total: YEARS.reduce((s,fy)=>s+(MONTHLY[fy][m]||0),0)
}));
const maxTotal = Math.max(...monthSums.map(x=>x.total));

// ===== Build monthly table =====
function buildMonthlyTable() {
  const headerRow = document.getElementById('month-header-row');
  // Add month headers
  MONTHS.forEach(m => {
    const th = document.createElement('th');
    th.className = 'month-col';
    th.id = 'mh-' + m;
    th.textContent = m;
    th.onclick = () => toggleMonth(m);
    headerRow.appendChild(th);
  });
  const thTotal = document.createElement('th');
  thTotal.className = 'year-total';
  thTotal.textContent = '年度計';
  headerRow.appendChild(thTotal);

  const tbody = document.getElementById('monthly-body');

  // FY rows
  YEARS.forEach(fy => {
    const tr = document.createElement('tr');
    const tdFY = document.createElement('td');
    tdFY.className = fy === 'FY2024' ? 'fy24-row' : fy === 'FY2025' ? 'fy25-row' : 'fy26-row';
    tdFY.textContent = fy;
    tr.appendChild(tdFY);

    MONTHS.forEach(m => {
      const v = MONTHLY[fy][m] || 0;
      const td = document.createElement('td');
      td.className = 'month-cell ' + (v === 0 ? 'zero' : 'has-val');
      td.id = 'mc-' + fy + '-' + m;
      td.textContent = v === 0 ? '—' : fmtS(v);
      td.onclick = () => toggleMonth(m);
      tr.appendChild(td);
    });

    const tdSum = document.createElement('td');
    tdSum.className = 'year-total';
    const fyTotal = Object.values(MONTHLY[fy]).reduce((s,v)=>s+v,0);
    tdSum.textContent = fmtS(fyTotal);
    tr.appendChild(tdSum);

    tbody.appendChild(tr);
  });

  // Bar row
  const barTr = document.createElement('tr');
  barTr.id = 'bar-row';
  barTr.style.borderTop = '2px solid #21262d';
  barTr.style.background = '#0d1117';

  const tdLabel = document.createElement('td');
  tdLabel.style.cssText = 'color:#6e7681;font-size:11px;text-align:center;padding:7px 6px;';
  tdLabel.textContent = '月合計';
  barTr.appendChild(tdLabel);

  monthSums.forEach(ms => {
    const td = document.createElement('td');
    td.id = 'bar-' + ms.m;
    td.onclick = () => toggleMonth(ms.m);
    const barH = maxTotal > 0 ? Math.max(ms.total / maxTotal * 40, 2) : 2;
    td.innerHTML = `<span class="bar-label">${fmtS(ms.total)}</span><div class="bar" style="height:${barH}px"></div>`;
    barTr.appendChild(td);
  });

  const tdGrandTotal = document.createElement('td');
  tdGrandTotal.className = 'year-total';
  tdGrandTotal.style.cssText = 'font-size:12px;text-align:center;vertical-align:middle;padding:7px 6px;';
  tdGrandTotal.textContent = fmtS(monthSums.reduce((s,m)=>s+m.total,0));
  barTr.appendChild(tdGrandTotal);

  tbody.appendChild(barTr);
}

// ===== Toggle month =====
function toggleMonth(m) {
  if (selectedMonth === m) {
    resetMonth();
    return;
  }
  selectedMonth = m;
  updateHighlight();
  renderSummaryCards();
  renderClientTable();

  document.getElementById('reset-btn').style.display = 'inline-block';
  document.getElementById('reset-btn').textContent = '✕ ' + m + ' 選択解除';
}

function resetMonth() {
  selectedMonth = null;
  updateHighlight();
  document.getElementById('summary-cards').style.display = 'none';
  document.getElementById('reset-btn').style.display = 'none';
  renderClientTable();
}

function updateHighlight() {
  MONTHS.forEach(m => {
    const th = document.getElementById('mh-' + m);
    const barTd = document.getElementById('bar-' + m);
    const active = selectedMonth === m;

    th.classList.toggle('active', active);
    barTd.classList.toggle('active', active);

    YEARS.forEach(fy => {
      const td = document.getElementById('mc-' + fy + '-' + m);
      if (!td) return;
      const v = MONTHLY[fy][m] || 0;
      if (active) {
        td.style.background = YM[fy];
        td.style.color = v === 0 ? '#30363d' : YC[fy];
        td.style.fontWeight = v === 0 ? '' : '600';
        td.style.borderLeft = '2px solid rgba(56,139,253,0.3)';
      } else {
        td.style.background = '';
        td.style.color = v === 0 ? '#30363d' : '#cdd9e5';
        td.style.fontWeight = '';
        td.style.borderLeft = '2px solid transparent';
      }
    });
  });
}

// ===== Summary cards =====
function renderSummaryCards() {
  if (!selectedMonth) return;
  const ms = monthSums.find(x => x.m === selectedMonth);
  const container = document.getElementById('summary-cards');
  container.style.display = 'grid';
  container.innerHTML = '';
  const vals = {FY2024: ms.fy24, FY2025: ms.fy25, FY2026: ms.fy26};
  YEARS.forEach(fy => {
    const v = vals[fy];
    const card = document.createElement('div');
    card.className = 'summary-card';
    card.style.border = `1px solid ${YC[fy]}40`;
    card.innerHTML = `
      <div class="fy-label" style="color:${YC[fy]}">${fy} · ${selectedMonth}</div>
      <div class="fy-amount">${fmt(v)}</div>
      <div class="fy-sub">売上合計</div>
    `;
    container.appendChild(card);
  });
}

// ===== Client table =====
function getClientData() {
  if (!selectedMonth) {
    // 全期間合計
    const agg = {};
    Object.values(MC).flat().forEach(r => {
      if (!agg[r.n]) agg[r.n] = {n:r.n, y24:0, y25:0, y26:0};
      agg[r.n].y24 += r.y24;
      agg[r.n].y25 += r.y25;
      agg[r.n].y26 += r.y26;
    });
    return Object.values(agg).sort((a,b) => (b.y24+b.y25+b.y26) - (a.y24+a.y25+a.y26));
  }
  const mn = MONTH_NUM[selectedMonth];
  return (MC[mn] || []);
}

let currentData = [];

function renderClientTable() {
  currentData = getClientData();
  const monthTag = document.getElementById('month-tag');
  const totalTag = document.getElementById('total-tag');
  if (selectedMonth) {
    monthTag.textContent = '— ' + selectedMonth + '（' + currentData.length + '社）';
    totalTag.textContent = '';
  } else {
    monthTag.textContent = '';
    totalTag.textContent = '全期間合計';
  }
  document.getElementById('search').value = '';
  renderRows(currentData);
}

function filterClients() {
  const q = document.getElementById('search').value;
  const filtered = q ? currentData.filter(r => r.n.includes(q)) : currentData;
  renderRows(filtered);
}

function renderRows(rows) {
  const tbody = document.getElementById('client-body');
  tbody.innerHTML = '';
  rows.forEach((c, i) => {
    const tot = c.y24 + c.y25 + c.y26;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="num-col">${i+1}</td>
      <td class="name-col">${escHtml(c.n)}</td>
      <td style="color:${c.y24 ? YC.FY2024 : '#30363d'}">${c.y24 ? fmt(c.y24) : '—'}</td>
      <td style="color:${c.y25 ? YC.FY2025 : '#30363d'}">${c.y25 ? fmt(c.y25) : '—'}</td>
      <td style="color:${c.y26 ? YC.FY2026 : '#30363d'}">${c.y26 ? fmt(c.y26) : '—'}</td>
      <td style="font-weight:600;color:#e6edf3">${fmt(tot)}</td>
    `;
    tbody.appendChild(tr);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== Init =====
buildMonthlyTable();
renderClientTable();
</script>
